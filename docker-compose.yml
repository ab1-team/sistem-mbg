services:
    # PHP Service
    php:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        image: yayasan-mbg-php
        container_name: yayasan-mbg-php
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            # Use named volumes for hot-path dirs to bypass slow Windows filesystem I/O
            - php_framework_cache:/var/www/storage/framework
            - php_bootstrap_cache:/var/www/bootstrap/cache
        networks:
            - app-network

    # Nginx Service
    nginx:
        image: nginx:alpine
        container_name: yayasan-mbg-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - php_framework_cache:/var/www/storage/framework
            - php_bootstrap_cache:/var/www/bootstrap/cache
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - app-network
        depends_on:
            - php

    # MySQL Service
    mysql:
        image: mysql:8.0
        container_name: yayasan-mbg-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_ALLOW_EMPTY_PASSWORD: "no"
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        ports:
            - "3307:3306"
        volumes:
            - mysql-db:/var/lib/mysql
        networks:
            - app-network

    # Redis Service
    redis:
        image: redis:alpine
        container_name: yayasan-mbg-redis
        restart: unless-stopped
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    mysql-db:
        driver: local
    php_framework_cache:
        driver: local
    php_bootstrap_cache:
        driver: local
