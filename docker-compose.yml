services:
    # PHP Service
    php:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        image: sim-sppg-php
        container_name: sim-sppg-php
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www:z
            # Use named volumes for hot-path dirs to bypass slow Windows filesystem I/O
            - php_framework_cache:/var/www/storage/framework:z
            - php_bootstrap_cache:/var/www/bootstrap/cache:z
        networks:
            - sim-sppg-network
            - web-network

    # Nginx Service
    nginx:
        image: nginx:alpine
        container_name: sim-sppg-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www:z
            - php_framework_cache:/var/www/storage/framework:z
            - php_bootstrap_cache:/var/www/bootstrap/cache:z
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
        networks:
            - sim-sppg-network
            - web-network
        depends_on:
            - php

    # MySQL Service
    mysql:
        image: mysql:8.0
        container_name: sim-sppg-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_ALLOW_EMPTY_PASSWORD: "no"
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        ports:
            - "3307:3306"
        volumes:
            - mysql-db:/var/lib/mysql:z
        networks:
            - sim-sppg-network
            - web-network

    # Redis Service
    redis:
        image: redis:alpine
        container_name: sim-sppg-redis
        restart: unless-stopped
        networks:
            - sim-sppg-network
            - web-network

networks:
    sim-sppg-network:
        driver: bridge
    web-network:
        external: true

volumes:
    mysql-db:
        driver: local
    php_framework_cache:
        driver: local
    php_bootstrap_cache:
        driver: local
