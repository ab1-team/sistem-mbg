name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/enpii/apps/sim-sppg
            git pull origin main
            docker compose up -d --build
            docker compose exec -T php composer install --no-dev --optimize-autoloader --no-interaction
            docker compose exec -T php npm install
            docker compose exec -T php npm run build
            docker compose exec -T php php artisan migrate --force
            docker compose exec -T php php artisan tenants:migrate --force
            docker compose exec -T php php artisan optimize:clear
            docker compose exec -T php php artisan optimize
